<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mdtero Settings</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body class="panel panel-options">
    <main class="shell shell-wide">
      <section class="hero">
        <div class="brand-row">
          <div class="brand-mark" aria-hidden="true">M</div>
          <div class="brand-copy">
            <h1 id="settings-title">Mdtero Account</h1>
            <p id="settings-subtitle">Connect email, check credits, and tune preferences.</p>
          </div>
          <button id="language-toggle" type="button" class="ghost-chip">中文</button>
        </div>
        <div class="account-bar">
          <div>
            <p id="account-status" class="meta-label">Not signed in.</p>
            <p id="usage-status" class="meta-value">Usage not loaded.</p>
          </div>
        </div>
      </section>

      <section class="card">
        <label id="email-label" for="email-input">Email</label>
        <input id="email-input" type="email" placeholder="you@example.com" />
        <div class="button-row">
          <button id="send-code" type="button" class="secondary-button">Send Code</button>
          <button id="verify-code" type="button" class="primary-button">Verify Login</button>
        </div>

        <label id="code-label" for="code-input">Verification Code</label>
        <input id="code-input" type="text" placeholder="123456" />
      </section>

      <section class="card">
        <label id="ui-language-label" for="ui-language">Interface language</label>
        <select id="ui-language">
          <option value="zh">中文</option>
          <option value="en">English</option>
        </select>
      </section>

      <details class="card">
        <summary id="advanced-summary">Advanced</summary>
        <label id="elsevier-api-key-label" for="elsevier-api-key">Elsevier API Key</label>
        <input id="elsevier-api-key" type="password" placeholder="Key (optional)" />
        <p class="meta-label">
          <a href="https://dev.elsevier.com/" target="_blank" rel="noopener noreferrer">Get your API key</a> to bypass rate limits.
        </p>

        <label id="api-base-url-label" for="api-base-url">API URL</label>
        <input id="api-base-url" type="url" placeholder="http://127.0.0.1:8000" />
        <button id="save-settings" type="button" class="secondary-button">Save</button>
      </details>

      <section class="card" id="history-section" style="display: none;">
        <div style="display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 0.5rem;">
          <h2 id="history-title" style="margin: 0;">Document History</h2>
          <button id="refresh-history" type="button" class="ghost-chip">Refresh</button>
        </div>
        <p id="history-note" class="meta-label">Downloads from your history are always free.</p>
        <div id="history-list" style="display: flex; flex-direction: column; gap: 0.75rem; margin-top: 1rem;">
          <p class="meta-label">Loading history...</p>
        </div>
      </section>
    </main>
    <script type="module" src="./options.js"></script>
  </body>
</html>
